version: '3'
services:
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    restart: always
    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3000:3000/tcp" # Port do pierwszej konfiguracji
      - "8585:80/tcp"   # Panel administracyjny (zmienimy na 8585, żeby nie kolidował)
      - "4443:443/tcp"

volumes:
  adguard_work:
  adguard_conf: