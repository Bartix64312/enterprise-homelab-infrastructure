services:
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Warsaw
      - USER=example
      - PASS=example
    volumes:
      - transmission_config:/config
      - /home/example/media/filmy:/downloads 
    ports:
      - 9091:9091
      - 51413:51413
      - 51413:51413/udp
    restart: always

volumes:
  transmission_config: