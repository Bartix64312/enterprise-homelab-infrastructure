version: "2.1"
services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Warsaw
    volumes:
      - prowlarr_config:/config
    ports:
      - 9696:9696
    restart: always

volumes:
  prowlarr_config:
