version: '3.5'
services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Warsaw
    volumes:
      - jellyfin_config:/config
      
      - /home/user/media:/data/media
    ports:
      - 8096:8096
    restart: always

volumes:
  jellyfin_config: